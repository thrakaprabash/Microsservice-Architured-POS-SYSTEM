apiVersion: v1
kind: ConfigMap
metadata:
  name: pos-config
  namespace: pos-system
  labels:
    app: pos-system
data:
  # Ports
  AUTH_SERVICE_PORT: "4001"
  PRODUCT_SERVICE_PORT: "4002"
  ORDER_SERVICE_PORT: "4003"
  PAYMENT_SERVICE_PORT: "4004"
  REPORT_SERVICE_PORT: "4005"
  API_GATEWAY_PORT: "3000"

  # Internal service URLs (Kubernetes DNS: <service-name>.<namespace>.svc.cluster.local)
  AUTH_SERVICE_URL: "http://auth-service.pos-system.svc.cluster.local:4001"
  PRODUCT_SERVICE_URL: "http://product-service.pos-system.svc.cluster.local:4002"
  ORDER_SERVICE_URL: "http://order-service.pos-system.svc.cluster.local:4003"
  PAYMENT_SERVICE_URL: "http://payment-service.pos-system.svc.cluster.local:4004"
  REPORT_SERVICE_URL: "http://report-service.pos-system.svc.cluster.local:4005"

  # MongoDB connection strings
  AUTH_MONGODB_URI: "mongodb://mongodb.pos-system.svc.cluster.local:27017/pos-auth"
  PRODUCT_MONGODB_URI: "mongodb://mongodb.pos-system.svc.cluster.local:27017/pos-products"
  ORDER_MONGODB_URI: "mongodb://mongodb.pos-system.svc.cluster.local:27017/pos-orders"
  PAYMENT_MONGODB_URI: "mongodb://mongodb.pos-system.svc.cluster.local:27017/pos-payments"

  # JWT config
  JWT_EXPIRES_IN: "7d"

  # Frontend URL for CORS
  FRONTEND_URL: "http://localhost"
