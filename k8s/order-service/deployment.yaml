apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: pos-system
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: pos/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: pos-config
                  key: ORDER_MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pos-config
                  key: PRODUCT_SERVICE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: pos-system
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  type: ClusterIP
  ports:
    - port: 4003
      targetPort: 4003
