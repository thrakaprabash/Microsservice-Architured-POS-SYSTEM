apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: pos-system
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: pos/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: pos-config
                  key: PAYMENT_MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: pos-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pos-config
                  key: ORDER_SERVICE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: pos-system
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  type: ClusterIP
  ports:
    - port: 4004
      targetPort: 4004
